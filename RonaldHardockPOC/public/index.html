<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food POC</title>
    <style>
        /* Minimal Styling */
        body { font-family: sans-serif; margin: 40px; color: #333; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        tr:nth-child(even) { background-color: #fafafa; }
    </style>
</head>
<body>

    <h1>Menu Items</h1>
    <div id="loading">Loading menu...</div>

    <table id="food-table" style="display: none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>Product Name</th>
                <th>Price</th>
            </tr>
        </thead>
        <tbody id="food-body">
            </tbody>
    </table>

    <script>
     async function fetchFoods() {
       try {
         // Fetch data from our Express route
         const response = await fetch('/foods');
         const foods = await response.json();

         const tableBody = document.getElementById('food-body');
         const table = document.getElementById('food-table');
         const loader = document.getElementById('loading');

         // Loop through the array and create table rows
         foods.forEach(item => {
           const row = `<tr>
                        <td>${item.id}</td>
                        <td>${item.name}</td>
                        <td>$${item.price.toFixed(2)}</td>
                    </tr>`;
           tableBody.innerHTML += row;
         });

         // Hide loader and show table
         loader.style.display = 'none';
         table.style.display = 'table';

       } catch (error) {
         console.error("Error fetching foods:", error);
         document.getElementById('loading').innerText = "Failed to load food items.";
       }
     }

     // Run the function when the page loads
     fetchFoods();
    </script>
</body>
</html>
