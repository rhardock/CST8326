<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ronald Hardock - CST8326</title>
    <style>
     body { font-family: sans-serif; margin: 40px; color: #333; }
     table { width: 100%; border-collapse: collapse; margin-top: 20px; }
     th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
     th { background-color: #f4f4f4; }
     tr:nth-child(even) { background-color: #fafafa; }
    </style>
  </head>
  <body>
    <header style="border-bottom: 2px solid #333; margin-bottom: 20px; padding-bottom: 10px;">
      <h1>Ronald Hardock - CST8326 - Winter 2026</h1>
      <p style="font-size: 1.2rem; font-weight: bold; color: #555;">
        Assignment 3: Proof of Concept (POC)
      </p>
    </header>

    <h1>Menu Items</h1>
    <div id="loading">Loading menu...</div>

    <table id="food-table" style="display: none;">
      <thead>
        <tr>
          <th>ID</th>
          <th>Product Name</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="food-body">
      </tbody>
    </table>

    <script>
     async function fetchFoods() {
       try {
         // Fetch data from our Express route
         const response = await fetch('/foods');
         const foods = await response.json();

         const tableBody = document.getElementById('food-body');
         const table = document.getElementById('food-table');
         const loader = document.getElementById('loading');

         // Loop through the array and create table rows
         foods.forEach(item => {
           const row = `<tr>
                        <td>${item.id}</td>
                        <td>${item.name}</td>
                        <td>$${item.price.toFixed(2)}</td>
                    </tr>`;
           tableBody.innerHTML += row;
         });

         // Hide loader and show table
         loader.style.display = 'none';
         table.style.display = 'table';

       } catch (error) {
         console.error("Error fetching foods:", error);
         document.getElementById('loading').innerText = "Failed to load food items.";
       }
     }

     // Run the function when the page loads
     fetchFoods();
    </script>

    <footer style="margin-top: 40px; border-top: 1px solid #ddd; padding-top: 10px;">
      <p style="font-style: italic; color: #555;">
        Disclaimer: This app is ONLY for demonstrating a student’s web development skills.
      </p>
    </footer>
  </body>
</html>
